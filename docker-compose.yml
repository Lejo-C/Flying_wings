version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anti_uas_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app/model:/app/app/model
      - ./backend/data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anti_uas_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
